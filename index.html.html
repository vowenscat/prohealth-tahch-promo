                React.createElement("span",{style:{background:vc.badge,color:vc.text,fontSize:11.5,fontWeight:500,padding:"2px 9px",borderRadius:20}},vendor),
                vd.link&&React.createElement("a",{href:vd.link,target:"_blank",rel:"noopener noreferrer",style:{fontSize:11.5,color:vc.border,textDecoration:"underline"}},"Product ↗")
              ),
              vd.sku&&vd.sku!=="—"&&React.createElement("div",{style:{marginBottom:8,padding:"3px 8px",background:vc.bg,borderRadius:"var(--border-radius-md)",display:"inline-block"}},
                React.createElement("span",{style:{fontSize:10.5,fontWeight:500,color:vc.text,textTransform:"uppercase",letterSpacing:"0.03em"}},"SKU "),
                React.createElement("span",{style:{fontSize:12,fontFamily:vd.sku!=="N/A – quote required"?"var(--font-mono)":"inherit",color:vc.text}},vd.sku)
              ),
              FIELDS.filter(f=>f.key!=="link"&&f.key!=="sku").map(field=>
                React.createElement("div",{key:field.key,style:{borderTop:"0.5px solid var(--color-border-tertiary)",paddingTop:7,marginTop:7}},
                  React.createElement("p",{style:{margin:"0 0 2px",fontSize:10.5,fontWeight:500,color:"var(--color-text-secondary)",textTransform:"uppercase",letterSpacing:"0.03em"}},field.label),
                  React.createElement("p",{style:{margin:0,fontSize:12.5,lineHeight:1.4,color:vd[field.key]&&vd[field.key]!=="—"?"var(--color-text-primary)":"var(--color-text-tertiary)"}},vd[field.key]||"—")
                )
              )
            );
          })
        ),
    React.createElement("div",{style:{marginTop:20,padding:"12px 14px",background:"var(--color-background-secondary)",borderRadius:"var(--border-radius-md)",fontSize:12,color:"var(--color-text-secondary)",lineHeight:1.6}},
      React.createElement("p",{style:{margin:"0 0 4px",fontWeight:500,color:"var(--color-text-primary)"}},"Data notes"),
      React.createElement("p",{style:{margin:"0 0 3px"}},"• All vendor links go to exact product pages as provided. SKUs taken directly from those URLs."),
      React.createElement("p",{style:{margin:"0 0 3px"}},'• Fields showing "—" require confirmation on the product page — pricing could not be scraped automatically.'),
      React.createElement("p",{style:{margin:"0 0 3px"}},"• Some items note alternate product options in the Notes field where multiple links were provided."),
      React.createElement("p",{style:{margin:0}},"• All prices are pre-tax and exclude shipping unless noted.")
    )
  );
}
ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
